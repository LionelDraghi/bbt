name: Build and test

on:                    # Run the workflow for each of the following events:
  push:                # - The main branch is pushed or updated.
    branches:
      - main
    paths: &trigger_paths
      - 'src/**'
      - 'tests/**'
      - 'tools/**'
      - 'docs/features/**'
      - 'docs/examples/**'
      - 'Makefile'
      - 'alire.toml'

  pull_request:        # - A pull-request is opened or updated.
    paths: *trigger_paths
    
  workflow_dispatch:   # - A manual run of the workflow is requested from the GitHub web interface.
  
  release:
    types: [created]   # - A release is created.

permissions: write-all

jobs:
  main:
    strategy:
      fail-fast: false # Don't stop all the workflows when one of them fails.
    
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest] # List of GitHub Actions platform to run the workflow on
    env:
      #  set the value of the environment variable OS_PLATFORM according to the runner OS
      OS_PLATFORM: ${{ matrix.os == 'windows-latest' && 'Windows' || matrix.os == 'ubuntu-latest' && 'Linux' || matrix.os == 'macos-latest' && 'Darwin' || 'Unknown' }}
    runs-on: ${{ matrix.os }} # Run the continuous integration workflow on each OS listed in the matrix.
    
    steps:
        # Check-out the repository
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1  # Shallow clone (faster, less output)
        env:
          GIT_PROGRESS: 0  # Disable git progress messages

        # Install and setup Alire package manager
      - uses: alire-project/setup-alire@v5
        # with:
        #   version: 2.1.0 # Remove this option to use the default (latest stable release)

      - name: Cache Alire dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/alire
            ~/.local/share/alire
          key: ${{ runner.os }}-alire-${{ hashFiles('alire.toml') }}
          restore-keys: |
            ${{ runner.os }}-alire-

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-mlc
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup tools (rpl, mlc)
        # Note: On Windows runners, bash is available via Git for Windows (which includes MSYS2).
        # This allows using the same bash script across all platforms.
        shell: bash
        run: |
          # Install mlc if not present
          if ! command -v mlc >/dev/null 2>&1; then
            cargo install --locked mlc
          else
            echo "mlc already installed"
          fi

          if [[ "${{ runner.os }}" == "Linux" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq rpl

          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            brew update
            brew install rpl
          
          elif [[ "${{ runner.os }}" == "Windows" ]]; then
            choco install -y --no-progress wget
            # Download rpl for Windows
            # Use a direct SourceForge download link and bypass the interstitial page
            rplUrl="https://downloads.sourceforge.net/project/gnuwin32/rpl/1.4.1/rpl-1.4.1-bin.zip"
            curl -sL -o rpl.zip "$rplUrl"
            unzip -q rpl.zip -d C:/GnuWin32
            echo "C:/GnuWin32/bin" >> $GITHUB_PATH
          
          fi

      - name: Run build and checks
        env:
          GNAT_FILE_NAME_CASE_SENSITIVE: ${{ startsWith(matrix.os, 'macos-') && '1' || '' }}
          # cf. https://forum.ada-lang.io/t/name-file-casing-error-on-darwin/1795
        run: make -k
        
      - name: Save summary
        run: cat docs/tests_results/${OS_PLATFORM}/features_results.md > ${GITHUB_STEP_SUMMARY}
        shell: bash

      - name: tests results publishing
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: docs/tests_results/${{ env.OS_PLATFORM }}/features_results.xml
